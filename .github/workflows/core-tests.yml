name: core tests

on:
  push:
    branches: ["**"]
    paths:
      - "core/**"
      - "data/**"
      - ".github/workflows/core-tests.yml"
  pull_request:
    paths:
      - "core/**"
      - "data/**"
      - ".github/workflows/core-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Run core tests (no dependencies to install)
        working-directory: core
        run: npm test
